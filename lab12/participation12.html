<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participation 12</title>
    <style>
        #schoolname {
            font-size: 40px;
            cursor: pointer;
        }
    </style>
    <script>
        function changeText() {
            let school = document.getElementById("schoolname");
            school.innerHTML = "Orange Nation";
            school.style.color = "orange";
        }
    </script>
</head>
<body>

    <div id="schoolname" onclick="changeText()">
        Syracuse University
    </div>

</body>
</html>
