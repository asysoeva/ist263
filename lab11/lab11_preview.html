<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lab 11 Preview Shell Game</title>
    <link rel="stylesheet" href="https://peopel-su.github.io/ist263/images/animate2.css">
    

    <style>
        .container {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        #first {
            order: 1;
        }

        #second {
            order: 2;
        }

        #third {
            order: 3;
        }

        #messages {
            text-align: center;
            font-size: 2em;
            font-weight: bold;
            margin-top: 30px;
        }

        img {
            width: 250px;
            height: auto;
            cursor: pointer;
        }
    </style>

    <script>
        function WinnerMessage() {
            document.getElementById('messages').innerHTML = 'You Won';
        }

        function TryAgain() {
            document.getElementById('messages').innerHTML = 'Wrong Shell - Try Again';
        }

        function ShuffleShells() {
            document.getElementById("first").style.order = Math.floor((Math.random() * 3) + 2);
        }
    </script>
</head>

<body onload="ShuffleShells();">
    <h1>Choose a Walnut</h1>

    <div class="container">
        <img id="first" src="walnut.png" alt="Walnut shell 1" onclick="WinnerMessage();">
        <img id="second" src="walnut.png" alt="Walnut shell 2" onclick="TryAgain();">
        <img id="third" src="walnut.png" alt="Walnut shell 3" onclick="TryAgain();">
    </div>

    <div id="messages"></div>
</body>
</html>
