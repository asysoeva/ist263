<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Lab 11 Shell Game</title>
    <script>
        function WinnerMessage() {
            alert('You Won');
        }

        function TryAgain() {
            alert('Wrong Shell - Try Again');
        }
    </script>
</head>

<body>
    <h1>Choose a Walnut</h1>

    <img src="walnut.png" alt="Walnut shell 1" onclick="WinnerMessage();">
    <img src="walnut.png" alt="Walnut shell 2" onclick="TryAgain();">
    <img src="walnut.png" alt="Walnut shell 3" onclick="TryAgain();">
</body>
</html>
