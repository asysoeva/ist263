    <h1>Contact</h1>

    <main>
        <div class="row1">
            <div class="address">
                <h2>Address</h2>
                <p>
                    Anastasia Sysoeva<br>
                    405 Small Rd<br>
                    Syracuse, NY 13210
                </p>
            </div>

            <div class="links">
                <h2>Links</h2>

                <p>
                    <a href="mailto:Sysoeva.nastia2003@gmail.com">sysoeva.nastia2003@gmail.com</a>
                </p>

                <p>
                    <a href="https://www.linkedin.com/in/sysoevaanastasia" target="_blank">My LinkedIn Profile</a>
                </p>

                <p>
                    <a href="https://www.linkedin.com/in/sysoevaanastasia" target="_blank">
                        <img src="../images/linkedin-small.png" alt="LinkedIn logo">
                    </a>
                </p>
            </div>
        </div>

        <div class="row2">
            <div class="formbox">
                <h2>Contact Form</h2>

                <form action="https://formspree.io/f/meezbwnj" method="post">
                    <p>
                        <label for="fullname">Full Name:</label>
                        <input type="text" id="fullname" name="fullname">
                    </p>

                    <p>
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email">
                    </p>

                    <p>
                        <label for="topic">Reason for reaching out:</label>
                        <select id="topic" name="topic">
                            <option value="networking">Networking</option>
                            <option value="school">School</option>
                            <option value="tennis">Tennis</option>
                            <option value="other">Other</option>
                        </select>
                    </p>

                    <p>
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="6" cols="40"></textarea>
                    </p>

                    <p>
                        <input type="submit" value="Send">
                    </p>
                </form>
            </div>

            <div class="mapbox">
                <h2>My Location</h2>
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2916.9291529493084!2d-76.11889212381291!3d43.021878371139124!2m3!1f0!3f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89d9f37d82c4d06f%3A0x1727a179addd3354!2s405%20Small%20Rd%2C%20Syracuse%2C%20NY%2013210!5e0!3m2!1sen!2sus!4v1769637173490!5m2!1sen!2sus"
                    title="Map of 405 Small Rd, Syracuse, NY"
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </main>

</html>
